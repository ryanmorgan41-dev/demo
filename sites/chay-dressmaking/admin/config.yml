# Decap CMS — generated by storefront-kit/provision.py.
# NOTE: Decap only preserves fields declared here when publishing — hidden widgets stay, never remove them.

# Local dev: `npx decap-server` in the repo root, then open this admin — no login needed.
local_backend: true

# For CLIENT email logins, replace this block with the DecapBridge snippet — storefront-kit/SETUP.md step 2.
backend:
  name: github
  repo: ryanmorgan41-dev/demo
  branch: main

publish_mode: simple
media_folder: "sites/chay-dressmaking/images"
public_folder: "images"

collections:
  - name: settings
    label: "My Site Settings"
    description: "Site-wide touches: the announcement bar across the top, and your hours and phone."
    files:
      - name: site
        label: "Site settings"
        file: "sites/chay-dressmaking/data/site.json"
        fields:
          - label: "Announcement bar"
            name: announcement
            widget: object
            hint: "A one-line banner across the top of every page — seasonal hours, closures, promotions."
            fields:
              - { label: "Show the announcement", name: show, widget: boolean, default: false }
              - { label: "What it says", name: text, widget: string, required: false }
              - { label: "Where it links", name: link, widget: string, required: false, hint: "Paste a web address to make the banner clickable — or leave this empty." }
          - { label: "Phone number", name: phone, widget: string, required: false, hint: "Shows on the site — e.g. (801) 555-0142." }
          - { label: "Hours", name: hours, widget: string, required: false, hint: "e.g. Mon–Sat 9–6." }
          - { label: "Business email", name: email, widget: string, required: false }
          - { label: "Form key", name: formKey, widget: hidden, required: false }
          - { label: "Booking link", name: bookingUrl, widget: hidden, required: false }
          - { label: "Analytics code", name: analyticsCode, widget: hidden, required: false }
